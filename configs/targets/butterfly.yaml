# configs/job_template.yaml をコピーして作った、butterfly(蝶)用のジョブ設定。
# 新しいジョブを作るときは、このファイルではなく configs/job_template.yaml をコピーすること。


# ============================================================
# セクション1: このジョブ固有の情報（★ 毎回必ず書き換える）
# ============================================================

target: butterfly

videos_dir: null
out_dir: null   # nullのままなら自動で output/butterfly/ になる


# ============================================================
# セクション2: 対象昆虫ごとの設定（★ 昆虫種が変わるときだけ書き換える）
# ============================================================

# YOLOモデル（20260619_ButterflyDetect実績モデル、config.example.jsonの規定パターンに合わせnを既定）
yolo_model_path: /Users/ktak0119/Documents/20260619_ButterflyDetect/models/butterfly/yolov8n_best.pt

vlm_search_target: "蝶"

clip_pos_prompts:
  - "a photo of a butterfly on a flower"
  - "a butterfly resting on a flower in a garden"
  - "a close-up of a butterfly with open wings on a flower"
  - "a moth or butterfly insect feeding on a flower"
clip_neg_prompts:
  - "a photo of grass and leaves blowing in the wind"
  - "a blurry photo of a flower with no insect"
  - "an empty garden scene with plants"
  - "a photo of bright sky glare through leaves"
  - "a photo of a spider or small bug on a leaf"
  - "a security camera photo of a plant stem with no animal"
  # コオニユリの花誤認対策として追加した実例（花弁の巻き・斑点模様が羽に見えて誤検知していた）:
  - "a macro photo of an orange tiger lily petal with dark red-brown spots, no insect"
  - "a curled-back lily flower petal that looks like a wing but is just a petal"
  - "an orange Lilium flower with spotted petals and recurved curled edges, no butterfly"
  - "a close-up of speckled flower petal texture, not an animal"

motion_min_area: 100
motion_max_area: 25000


# ============================================================
# セクション3: パイプライン共通パラメータ（★ 通常は触らない）
# ============================================================

bin_sec: 5.0

mog2_enabled: true
mog2_history: 300
mog2_var_threshold: 24
mog2_learning_rate: -1
mog2_warmup_frames: 15
mog2_mask_top_frac: 0.10

yolo_conf_threshold: 0.30
top_k_per_bin: 1
yolo_batch_size: 24
tight_crop_pad_frac: 0.12
tight_crop_pad_min_px: 5

clip_model: "ViT-B-32"
clip_pretrained: "openai"
clip_apply_cutoff: false

target_recall: 0.95
score_fusion_methods:
  - yolo_only
  - clip_only
  - sum
  - logistic_regression

clip_pad_sec: 2.0
merge_gap_sec: 4.0

resume: true
