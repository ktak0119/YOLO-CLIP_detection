# Stage3(optional)/Stage5表示用の探索対象文字列
vlm_search_target: "マルハナバチ"

# Stage1: MOG2の動体サイズ範囲（対象ごとに変えてよい3点目。未キャリブレーション時の暫定値）
motion_min_area: 100
motion_max_area: 25000
