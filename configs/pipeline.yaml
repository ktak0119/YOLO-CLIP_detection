# 全対象共通のパイプライン既定値。
# 対象ごとに変えてよいのはCLAUDE.mdの3点（VLM探索対象文字列・CLIP文言・動体サイズ範囲）のみ。
# それ以外の数値パラメータはここで対象非依存に一元管理し、targets/*.yaml側では上書きしない。

bin_sec: 5.0                    # 固定ビン長（秒）。仕様書§1で規定

# Stage1 (MOG2)
mog2_enabled: true               # false の場合 Stage2 が全フレームに直接動く（YOLO単独構成）
mog2_history: 300
mog2_var_threshold: 24
mog2_learning_rate: -1           # -1 = auto。静止対象の背景吸収リスクがある場合は手動で下げる
mog2_warmup_frames: 15
mog2_mask_top_frac: 0.10

# Stage2 (YOLO + ビン代表抽出)
yolo_conf_threshold: 0.30        # 1フレーム最大1件のbest boxを採用する信頼度閾値
top_k_per_bin: 1                 # ビンごとの代表クリップ枚数（K）。既定1、取りこぼしリスクは現段階で許容
yolo_batch_size: 24               # フラグ済みフレームをバッチ推論する際のバッチサイズ
tight_crop_pad_frac: 0.12          # クロップ余白（YOLOボックス基準、10-12%必須）
tight_crop_pad_min_px: 5

# Stage3 (CLIP)
clip_model: "ViT-B-32"
clip_pretrained: "openai"
clip_apply_cutoff: false           # 仕様書§2: 足切りはしない。スコア付与のみ

# Stage4 (スコア統合)
target_recall: 0.95                # 閾値決定用データでの目標Recall（仕様書§7）
score_fusion_methods:              # 比較する4方式（仕様書§6）
  - yolo_only
  - clip_only
  - sum
  - logistic_regression

# Stage6 (ビン結合)
clip_pad_sec: 2.0                   # ビン境界の前後に足すクリップ用パディング秒数
merge_gap_sec: 4.0                   # 隣接ビンをマージする間隔しきい値（pad_secの2倍が既定の目安）

# 共通
resume: true                          # 既存出力があればスキップ/再開する
